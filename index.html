<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>pretty shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        .container {
            padding: 20px;
        }

        .products {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background-color: white;
            padding: 15px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<header>
    <h1>pretty shop</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Produk</a>
    <a href="#">Kontak</a>
</nav>

<div class="container">
    <h2>Daftar Produk</h2>

    <div class="products">
        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Produk">
            <h3>Sneakers cute</h3>
            <p class="price">Rp 150.000</p>
            <button onclick="beliProduk('sneakers cute')">Beli</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Produk">
            <h3>Tas Stylish</h3>
            <p class="price">Rp 200.000</p>
            <button onclick="beliProduk('Tas Stylish')">Beli</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Produk">
            <h3>Jam Tangan</h3>
            <p class="price">Rp 300.000</p>
            <button onclick="beliProduk('Jam Tangan')">Beli</button>
        </div>
    
    </head>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
        <div class="contact-info">
            <p>Email: prettyshop@gmail.com</p>
            <p>Phone: 0897654321</p>
        </div>
</script>

</body>
</html>
